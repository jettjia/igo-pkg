# HTTP Server.
server:
  lang: zh-CN # "zh-CN", "zh-TW", "en"
  public_port: 33200 # 对外端口
  private_port: 33201 # 对内端口
  server_name: "netdisk-center"
  mode: "debug" # gin的模式配置 debug, test, release
  dev: true # true,false;校验token等,开发模式的时候打开
  server_mode: "debug" # 配置读取;debug(本地配置路径), release(k8s配置路径)
  enable_event: true
  enable_job: true
  enable_grpc: false

# GRPC Server.
gserver:
  host: "0.0.0.0" # 当前服务
  public_port: 33202 # 当前服务
  max_msg_size: 1024 # 最大发送接收字节数,单位 m
  client_goods_host: "0.0.0.0" # goods服务的host
  client_goods_port: 18080 # goods服务的port

# Log.
log:
  log_file_dir: "/tmp/logs/"
  max_size: 512
  max_backups: 64
  max_age: 7
  log_level: "debug" #自定义日志； trace, debug, info,panic, fatal, error, warn
  log_out: 1 # 1:console, 2:file, 3:mq, 4:es, 5:zs, 6:otel; default is console

# Database.
db:
  db_type: "pgsql"
  username: "root"
  password: "admin123"
  db_host: "127.0.0.1"
  db_port: 5432
  db_name: "xtext"
  charset: "utf8mb4"

  max_open_conn: 50 # 设置数据库连接池最大连接数
  max_idle_conn: 10 # 连接池最大允许的空闲连接数
  conn_max_lifetime: 500 # 设置连接可复用的最大时间
  log_mode: 4 # gorm错误级别; 1: Silent, 2:Error,3:Warn,4:Info
  slow_threshold: 10 # 慢查询

# mq.
mq:
  mq_type: "pgsql"
  mq_producer_host: "127.0.0.1"
  mq_producer_port: 5432 # tcp
  mq_subscribe_host: "127.0.0.1"
  mq_subscribe_port: 5432 # tcp

# cache
cache:
  cache_type: "pgsql"
  addr: "127.0.0.1:5432"
  password: ""
  redis_type: ""
  master_name: ""
  pool_size: 100

# third
third:
  # hydra
  hydra_scheme: "http"
  hydra_admin_host: "127.0.0.1"
  hydra_admin_port: 4445
  hydra_public_host: "127.0.0.1"
  hydra_public_port: 4444
